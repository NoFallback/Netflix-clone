<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="hero">
            <div class="hero-section">
                <div class="back-pic">
                    <div class="bar">
                        <div class="logo"><img src="Netflix_2015_logo.svg.png" alt="Netflix_logo"></div>
                        <div class="action">
                            <button class="language"><img src="lan-symbol.png" alt="symbol">English <img
                                    src="down-arrow.png" alt="down_arrow" class="d-arrow"> </button>
                            <button class="sign-in">Sign In</button>
                        </div>
                    </div>
                    <div class="hero-mid">
                        <div class="heading">
                            <h1>Unlimited movies, shows, and more</h1>
                            <h2>Starts at ₹149. Cancel at any time.</h2>
                        </div>
                        <div class="search">
                            <div class="read">Ready to watch? Enter your email to create or restart your membership.
                            </div>
                            <div class="write">
                                <input type="text" placeholder="Email address" class="ask-email">
                                <button class="start-b">
                                    <p>Get Started</p><svg width="100%" height="100%" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- <img src="https://assets.nflxext.com/ffe/siteui/vlv3/81b52f88-dc76-488d-a939-0cf13a260a6e/web/IN-en-20260622-TRIFECTA-perspective_d39d60ef-cb5a-4793-9546-0a8d9a87948e_large.jpg"
                alt="Welcome_Hero_image"> -->
        </div>
    </header>
    <main>
        <div class="content">
            <div class="slides">
                <div class="head">
                    <h2>Trending Now</h2>
                </div>
                <div class="slid-flex">
                    <div class="slid">
                        <div class="image">
                            <div class="num-slid">
                                1
                            </div>
                        </div>
                    </div>
                    <div class="slid">
                        <div class="image">
                            <div class="num-slid">
                                2
                            </div>
                        </div>
                    </div>
                    <div class="slid">
                        <div class="image">
                            <div class="num-slid">
                                3
                            </div>
                        </div>
                    </div>
                    <div class="slid">
                        <div class="image">
                            <div class="num-slid">
                                4
                            </div>
                        </div>
                    </div>
                    <div class="slid">
                        <div class="image">
                            <div class="num-slid">
                                5
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="faq"></div>
    </main>
    <footer>
        <div class="footer"></div>
    </footer>

</body>

</html>
